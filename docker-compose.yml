services:
  api:
    build: ./apps/api
    ports:
      - "3001:3001"
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://sshmanager:password@postgres:5432/sshmanager
      - REDIS_URL=redis://redis:6379
      - TZ=Asia/Phnom_Penh
      - TFTP_ROOT=/var/lib/ssh-manager/tftp-root
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - recordings:/var/lib/ssh-manager/recordings
      - shares:/tmp/ssh-manager-shares
      - guac-uploads:/tmp/guac-uploads
      - tftp-data:/var/lib/ssh-manager/tftp-root
      - assets:/var/lib/ssh-manager/assets

  # Guacamole RDP/VNC protocol daemon
  guacd:
    image: guacamole/guacd:1.5.5
    restart: unless-stopped
    volumes:
      - guac-uploads:/tmp/guac-uploads

  # WebSocket ↔ guacd proxy (browser connects here for Remote Desktop)
  guac-proxy:
    build: ./apps/guac-proxy
    restart: unless-stopped
    environment:
      - GUACD_HOST=guacd
      - GUACD_PORT=4822
      - PORT=3002
      - GUAC_CRYPT_KEY=${GUAC_CRYPT_KEY:-ChangeMe32CharKeyForGuacamole!!!}
    depends_on:
      - guacd

  web:
    build: ./apps/web
    ports:
      - "4004:4004"
    depends_on:
      - api
      - guac-proxy

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: sshmanager
      POSTGRES_USER: sshmanager
      POSTGRES_PASSWORD: password
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sshmanager"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --appendfsync everysec
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  debian-test:
    image: debian:12-slim
    hostname: debian-test
    ports:
      - "2223:22"
    command: >
      bash -c "
        apt-get update -qq &&
        apt-get install -y -qq openssh-server sudo &&
        mkdir -p /run/sshd /root/.ssh &&
        chmod 700 /root/.ssh &&
        echo 'root:root' | chpasswd &&
        sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config &&
        sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config &&
        sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config &&
        ssh-keygen -A &&
        echo 'Debian test server ready on port 2223' &&
        /usr/sbin/sshd -D
      "
    restart: unless-stopped

  ubuntu-test:
    image: ubuntu:22.04
    hostname: ubuntu-test
    ports:
      - "2222:22"
    command: >
      bash -c "
        apt-get update -qq &&
        apt-get install -y -qq openssh-server sudo &&
        mkdir -p /run/sshd /root/.ssh &&
        chmod 700 /root/.ssh &&
        echo 'root:root' | chpasswd &&
        sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config &&
        sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config &&
        sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config &&
        ssh-keygen -A &&
        echo 'Ubuntu test server ready on port 2222' &&
        /usr/sbin/sshd -D
      "
    restart: unless-stopped

  tftp-server:
    build: ./services/tftp
    ports:
      - "69:69/udp"
    volumes:
      - tftp-data:/tftp-root
    environment:
      - TFTP_ROOT=/tftp-root
    restart: unless-stopped

  # SNMP device simulator — 24-port Cisco Catalyst 2960X for testing Port Dashboard
  # Add a Network Device in SSH Manager: hostname=snmp-sim, SNMP enabled, community=public
  snmp-sim:
    build: ./apps/snmp-sim
    ports:
      - "16100:161/udp"
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  recordings:
  guac-uploads:
  shares:
  tftp-data:
  assets:
