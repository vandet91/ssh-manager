services:
  api:
    build: ./apps/api
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://sshmanager:password@postgres:5432/sshmanager
      - REDIS_URL=redis://redis:6379
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - recordings:/var/lib/ssh-manager/recordings

  web:
    build: ./apps/web
    ports:
      - "3000:3000"
    depends_on:
      - api

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: sshmanager
      POSTGRES_USER: sshmanager
      POSTGRES_PASSWORD: password
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sshmanager"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  debian-test:
    image: debian:12-slim
    hostname: debian-test
    ports:
      - "2223:22"
    command: >
      bash -c "
        apt-get update -qq &&
        apt-get install -y -qq openssh-server sudo &&
        mkdir -p /run/sshd /root/.ssh &&
        chmod 700 /root/.ssh &&
        echo 'root:root' | chpasswd &&
        sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config &&
        sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config &&
        sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config &&
        ssh-keygen -A &&
        echo 'Debian test server ready on port 2223' &&
        /usr/sbin/sshd -D
      "
    restart: unless-stopped

  ubuntu-test:
    image: ubuntu:22.04
    hostname: ubuntu-test
    ports:
      - "2222:22"
    command: >
      bash -c "
        apt-get update -qq &&
        apt-get install -y -qq openssh-server sudo &&
        mkdir -p /run/sshd /root/.ssh &&
        chmod 700 /root/.ssh &&
        echo 'root:root' | chpasswd &&
        sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config &&
        sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config &&
        sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config &&
        ssh-keygen -A &&
        echo 'Ubuntu test server ready on port 2222' &&
        /usr/sbin/sshd -D
      "
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  recordings:
