server {
    listen 4004;
    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 200m;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://api:3001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        # This block also carries WebSocket traffic (e.g. /api/psexec/session
        # for Remote Exec / WinRM). Without a long read timeout, nginx closes
        # an idle socket after the default 60s — same issue as the terminal's
        # /ws/ route, just on a different prefix. Regular REST calls finish in
        # milliseconds either way, so this only matters for long-lived sockets.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /auth/ {
        proxy_pass http://api:3001/auth/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /ws/ {
        proxy_pass http://api:3001/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        # Terminal sessions are idle for long stretches (no output while you read).
        # Without a long read timeout nginx closes the "silent" socket after the
        # default 60s, disconnecting idle terminals. Match the RDP tunnel.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Remote Desktop WebSocket → guacamole-lite proxy
    location /ws/rdp {
        proxy_pass http://guac-proxy:3002/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
