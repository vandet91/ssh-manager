# HTTPS overlay — trusted commercial certificate (Sectigo, DigiCert, GlobalSign, etc.)
#
# Place your cert files in nginx/ssl/ before starting:
#   nginx/ssl/fullchain.pem  — cert + intermediate chain
#   nginx/ssl/privkey.pem    — private key
#
# Usage (combine with the Linux overlay for production):
#   docker compose -f docker-compose.yml -f docker-compose.linux.yml -f docker-compose.https.yml up -d --build
#
# Or without host-network (Windows / Mac Docker Desktop):
#   docker compose -f docker-compose.yml -f docker-compose.https.yml up -d --build
#
# After starting, app is available at:
#   https://<your-domain-or-ip>

services:
  nginx-ssl:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/ssl.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl/fullchain.pem:/etc/nginx/ssl/fullchain.pem:ro
      - ./nginx/ssl/privkey.pem:/etc/nginx/ssl/privkey.pem:ro
    depends_on:
      - web
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Keep port 4004 exposed for direct HTTP access even when nginx-ssl is active
  web:
    ports:
      - "4004:4004"
